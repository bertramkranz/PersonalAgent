services:
  bertbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: personalagent-bertbot:local
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      BERTBOT_RUN_MODE: webhook
      BERTBOT_STATE_STORE: postgres
      BERTBOT_STATE_JDBC_URL: jdbc:postgresql://postgres:5432/bertbot
      BERTBOT_STATE_JDBC_USER: bertbot
      BERTBOT_STATE_JDBC_PASSWORD: bertbot
      BERTBOT_WEBHOOK_HOST: 0.0.0.0
      BERTBOT_WEBHOOK_PORT: 8088
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bertbot
      POSTGRES_USER: bertbot
      POSTGRES_PASSWORD: bertbot
    volumes:
      - bertbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bertbot -d bertbot"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    restart: unless-stopped
    volumes:
      - bertbot_ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  bertbot_postgres_data:
  bertbot_ollama_data:
