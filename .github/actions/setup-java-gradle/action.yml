name: Setup Java and Gradle

description: Optionally validate the Gradle wrapper, set up JDK 17, and make gradlew executable.

inputs:
  validate-wrapper:
    description: Run Gradle wrapper validation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate Gradle wrapper
      if: inputs.validate-wrapper == 'true'
      uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: temurin
        java-version: "17"
        cache: gradle

    - name: Make Gradle wrapper executable
      run: chmod +x gradlew
      shell: bash
