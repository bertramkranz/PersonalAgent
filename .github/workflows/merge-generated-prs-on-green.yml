name: Merge Generated PRs On Green

on:
  workflow_run:
    workflows:
      - CI
      - CodeQL
      - Dependency Review
      - Secret Scan
      - Actionlint
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: merge-generated-pr-${{ github.event.workflow_run.head_branch || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  merge-generated-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Approve and merge trusted generated PR when ready
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const trustedAuthors = new Set(['github-actions[bot]', 'app/github-actions']);
            const defaultBranch = context.payload.repository.default_branch;
            const requiredWorkflowNames = new Set([
              'CI',
              'CodeQL',
              'Dependency Review',
              'Secret Scan',
              'Actionlint',
            ]);
            const baseRequiredStatusContexts = ['quality-and-test', 'analyze', 'dependency-review', 'gitleaks'];
            const acceptedCheckConclusions = new Set(['success', 'neutral', 'skipped']);
            const autoMergeLabel = 'auto-merge';
            const ignoredStatusContexts = new Set(['merge-generated-pr', 'open-pr']);

            function isAcceptedCheckConclusion(conclusion) {
              return acceptedCheckConclusions.has(conclusion || '');
            }

            function isSameRepoEligiblePr(pr) {
              return (
                pr.state === 'open' &&
                !pr.draft &&
                pr.base.ref === defaultBranch &&
                pr.head.repo?.full_name === `${owner}/${repo}`
              );
            }

            async function resolveCandidatePullNumbers() {
              if (context.eventName === 'workflow_run') {
                const workflowRun = context.payload.workflow_run;
                if (workflowRun.event !== 'pull_request') {
                  core.info(`Skipping workflow_run triggered by '${workflowRun.event}'.`);
                  return [];
                }

                if (!['success', 'neutral', 'skipped', 'action_required'].includes(workflowRun.conclusion || '')) {
                  core.info(`Skipping workflow_run with conclusion '${workflowRun.conclusion}'.`);
                  return [];
                }

                const pullNumbers = new Set((workflowRun.pull_requests || []).map((pr) => pr.number).filter(Boolean));

                if (pullNumbers.size === 0 && workflowRun.head_branch) {
                  const { data: branchPullRequests } = await github.rest.pulls.list({
                    owner,
                    repo,
                    state: 'open',
                    head: `${owner}:${workflowRun.head_branch}`,
                    base: defaultBranch,
                  });

                  for (const pullRequest of branchPullRequests) {
                    pullNumbers.add(pullRequest.number);
                  }
                }

                return [...pullNumbers];
              }

              const { data: openPullRequests } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: defaultBranch,
                per_page: 100,
              });

              return openPullRequests.map((pr) => pr.number);
            }

            function isTrustedGeneratedPr(pr) {
              return (
                isSameRepoEligiblePr(pr) &&
                trustedAuthors.has(pr.user?.login || '') &&
                pr.title.startsWith('chore: merge ') &&
                (pr.body || '').includes('Automated pull request created after a branch push.')
              );
            }

            function hasAutoMergeLabel(pr) {
              return (pr.labels || []).some((label) => (label.name || '').toLowerCase() === autoMergeLabel);
            }

            function isLabelEligiblePr(pr) {
              return isSameRepoEligiblePr(pr) && hasAutoMergeLabel(pr);
            }

            async function listChangedFiles(pr) {
              return github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
            }

            async function requiredStatusContextsForPr(pr) {
              const changedFiles = await listChangedFiles(pr);
              const requiredContexts = new Set(baseRequiredStatusContexts);

              if (changedFiles.some((file) => (file.filename || '').startsWith('.github/workflows/'))) {
                requiredContexts.add('lint-workflows');
              }

              return [...requiredContexts];
            }

            async function listAllCheckRunsForRef(ref) {
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                },
                (response) => response.data.check_runs || []
              );

              return checkRuns.filter(Boolean);
            }

            async function listRelevantCommitStatusesForRef(ref) {
              const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
                owner,
                repo,
                ref,
                per_page: 100,
              });

              return statuses.filter(
                (status) => status && !ignoredStatusContexts.has(status.context || '')
              );
            }

            async function rerunActionRequiredChecks(pr) {
              const rerunRunIds = new Set();
              const checks = await listAllCheckRunsForRef(pr.head.sha);
              for (const checkRun of checks) {
                if (checkRun?.conclusion !== 'action_required') {
                  continue;
                }

                const detailsUrl = checkRun.details_url || '';
                const runIdMatch = detailsUrl.match(/\/actions\/runs\/(\d+)/);
                if (runIdMatch) {
                  rerunRunIds.add(runIdMatch[1]);
                }
              }

              for (const runId of rerunRunIds) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                    owner,
                    repo,
                    run_id: Number(runId),
                  });
                  core.info(`Requested rerun for action_required run ${runId} on PR #${pr.number}.`);
                } catch (error) {
                  core.info(`Unable to rerun run ${runId} on PR #${pr.number}: ${error.message}`);
                }
              }
            }

            async function rerunActionRequiredWorkflowRuns(pr) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                event: 'pull_request',
                branch: pr.head.ref,
                per_page: 100,
              });

              const workflowRuns = Array.isArray(runs?.workflow_runs) ? runs.workflow_runs.filter(Boolean) : [];

              for (const run of workflowRuns) {
                if (!requiredWorkflowNames.has(run?.name || '') || run?.conclusion !== 'action_required') {
                  continue;
                }

                try {
                  await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  core.info(`Requested rerun for action_required workflow run ${run.id} on PR #${pr.number}.`);
                } catch (error) {
                  core.info(`Unable to rerun workflow run ${run.id} on PR #${pr.number}: ${error.message}`);
                }
              }
            }

            async function checksAreGreen(pr) {
              const requiredContexts = await requiredStatusContextsForPr(pr);
              const statuses = await listRelevantCommitStatusesForRef(pr.head.sha);
              const observedContexts = new Set(statuses.map((status) => status.context || '').filter(Boolean));
              const missingContexts = requiredContexts.filter((contextName) => !observedContexts.has(contextName));

              if (missingContexts.length > 0) {
                core.info(`PR #${pr.number} is still waiting for statuses: ${missingContexts.join(', ')}`);
                return false;
              }

              const blockingStatuses = statuses.filter(
                (status) => requiredContexts.includes(status.context || '') && status.state !== 'success'
              );

              if (blockingStatuses.length > 0) {
                core.info(
                  `PR #${pr.number} has blocking statuses: ${blockingStatuses
                    .map((status) => `${status.context}:${status.state}`)
                    .join(', ')}`
                );
                return false;
              }

              const checks = await listAllCheckRunsForRef(pr.head.sha);
              const relevantChecks = checks.filter((checkRun) => requiredContexts.includes(checkRun?.name || ''));
              const blockingChecks = relevantChecks.filter(
                (checkRun) =>
                  checkRun?.status !== 'completed' ||
                  !isAcceptedCheckConclusion(checkRun?.conclusion)
              );

              if (blockingChecks.length > 0) {
                core.info(
                  `PR #${pr.number} has blocking checks: ${blockingChecks
                    .map((checkRun) => `${checkRun.name}:${checkRun.status}/${checkRun.conclusion}`)
                    .join(', ')}`
                );
                return false;
              }

              return true;
            }

            const candidatePullNumbers = await resolveCandidatePullNumbers();
            if (candidatePullNumbers.length === 0) {
              core.info('No candidate pull requests found for this event.');
              return;
            }

            for (const pullNumber of candidatePullNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              const trustedGeneratedPr = isTrustedGeneratedPr(pr);
              const labelEligiblePr = isLabelEligiblePr(pr);

              if (!trustedGeneratedPr && !labelEligiblePr) {
                core.info(
                  `Skipping PR #${pullNumber}: does not match trusted generated PR guardrails or '${autoMergeLabel}' label policy.`
                );
                continue;
              }

              await rerunActionRequiredChecks(pr);
              await rerunActionRequiredWorkflowRuns(pr);

              let checksGreen = await checksAreGreen(pr);
              if (!checksGreen) {
                const deadline = Date.now() + 5 * 60 * 1000;
                while (!checksGreen && Date.now() < deadline) {
                  core.info(`Waiting 30s for PR #${pr.number} checks to turn green.`);
                  await new Promise((resolve) => setTimeout(resolve, 30_000));
                  checksGreen = await checksAreGreen(pr);
                }
              }

              if (!checksGreen) {
                continue;
              }

              if (trustedGeneratedPr) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });

                const alreadyApproved = reviews.some(
                  (review) => review.state === 'APPROVED' && trustedAuthors.has(review.user?.login || '')
                );

                if (!alreadyApproved) {
                  try {
                    await github.rest.pulls.createReview({
                      owner,
                      repo,
                      pull_number: pullNumber,
                      event: 'APPROVE',
                      body: 'Automated approval for trusted generated PR after successful checks.',
                    });

                    core.info(`Approved PR #${pullNumber}.`);
                  } catch (error) {
                    const message = String(error.message || error);
                    if (error.status === 422 && message.includes('approve your own pull request')) {
                      core.info(`Approval skipped for PR #${pullNumber}: token identity matches PR author.`);
                    } else {
                      throw error;
                    }
                  }
                }
              }

              try {
                const mergeResponse = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: 'squash',
                });

                core.info(`Merged PR #${pullNumber}: ${mergeResponse.data.sha}`);
              } catch (error) {
                if ([405, 409, 422].includes(error.status)) {
                  core.info(`Merge deferred for PR #${pullNumber}: ${error.message}`);
                  continue;
                }

                throw error;
              }
            }