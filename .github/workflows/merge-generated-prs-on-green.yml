name: Merge Generated PRs On Green

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      verify_token_identity:
        description: "Log AUTOMATION_PAT actor identity for diagnostics"
        required: false
        default: "false"

permissions:
  actions: write
  checks: read
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  merge-generated-pr:
    runs-on: ubuntu-latest
    # Run on schedule or when dispatched manually.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    steps:
      - name: Verify automation token identity
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.verify_token_identity == 'true' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const { data: actor } = await github.rest.users.getAuthenticated();
            core.info(`Automation token authenticates as '${actor.login}'.`);

      - name: Approve and merge trusted generated PR when ready
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allowlistedAutoApproveAuthors = new Set(['bertramkranz']);
            const trustedAuthors = new Set(['github-actions[bot]', 'app/github-actions']);
            const defaultBranch = context.payload.repository.default_branch;
            const fallbackRequiredCheckNames = ['quality-and-test', 'analyze', 'dependency-review', 'gitleaks'];
            const acceptedCheckConclusions = new Set(['success', 'neutral', 'skipped']);
            const autoMergeLabel = 'auto-merge';
            let branchProtectionRequiredCheckNames = null;

            function isAcceptedCheckConclusion(conclusion) {
              return acceptedCheckConclusions.has(conclusion || '');
            }

            function normalizeCheckName(name) {
              return String(name || '').trim().toLowerCase();
            }

            function isSameRepoEligiblePr(pr) {
              return (
                pr.state === 'open' &&
                !pr.draft &&
                pr.base.ref === defaultBranch &&
                pr.head.repo?.full_name === `${owner}/${repo}`
              );
            }

            async function resolveCandidatePullNumbers() {
              // schedule/workflow_dispatch: scan all open PRs targeting the default branch
              const { data: openPullRequests } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: defaultBranch,
                per_page: 100,
              });

              return openPullRequests.map((pr) => pr.number);
            }

            function isTrustedGeneratedPr(pr) {
              return (
                isSameRepoEligiblePr(pr) &&
                trustedAuthors.has(pr.user?.login || '') &&
                pr.title.startsWith('chore: merge ') &&
                (pr.body || '').includes('Automated pull request created after a branch push.')
              );
            }

            function hasAutoMergeLabel(pr) {
              return (pr.labels || []).some((label) => (label.name || '').toLowerCase() === autoMergeLabel);
            }

            function isLabelEligiblePr(pr) {
              return isSameRepoEligiblePr(pr) && hasAutoMergeLabel(pr);
            }

            async function getBranchProtectionRequiredCheckNames() {
              if (Array.isArray(branchProtectionRequiredCheckNames)) {
                return branchProtectionRequiredCheckNames;
              }

              try {
                const { data: protection } = await github.rest.repos.getBranchProtection({
                  owner,
                  repo,
                  branch: defaultBranch,
                });

                const contexts = (protection?.required_status_checks?.contexts || [])
                  .map((value) => String(value || '').trim())
                  .filter(Boolean);

                if (contexts.length > 0) {
                  branchProtectionRequiredCheckNames = [...new Set(contexts)];
                  core.info(
                    `Using branch protection required checks: ${branchProtectionRequiredCheckNames.join(', ')}`
                  );
                  return branchProtectionRequiredCheckNames;
                }
              } catch (error) {
                core.info(`Unable to read branch protection checks: ${error.message}`);
              }

              branchProtectionRequiredCheckNames = [...fallbackRequiredCheckNames];
              core.info(
                `Falling back to workflow required checks: ${branchProtectionRequiredCheckNames.join(', ')}`
              );
              return branchProtectionRequiredCheckNames;
            }

            async function requiredCheckNamesForPr(pr) {
              const names = [...(await getBranchProtectionRequiredCheckNames())];

              // Include lint-workflows when the PR touches workflow files
              const changedFiles = await github.paginate(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number: pr.number, per_page: 100 },
                (response) => response.data
              );
              const touchesWorkflows = changedFiles.some((f) =>
                f.filename?.startsWith('.github/workflows/')
              );
              if (touchesWorkflows) {
                names.push('lint-workflows');
              }

              return names;
            }

            async function listAllCheckRunsForRef(ref) {
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                },
                (response) => response.data.check_runs || []
              );

              return checkRuns.filter(Boolean);
            }

            async function checksAreGreen(pr) {
              const required = await requiredCheckNamesForPr(pr);
              const allRuns = await listAllCheckRunsForRef(pr.head.sha);
              const availableCheckNames = [...new Set(allRuns.map((run) => run?.name).filter(Boolean))];
              core.info(
                `PR #${pr.number}: available checks on ${pr.head.sha}: ${availableCheckNames.join(', ')}`
              );

              const checksByNormalizedName = new Map();
              for (const run of allRuns) {
                const normalizedName = normalizeCheckName(run?.name);
                if (!normalizedName) {
                  continue;
                }
                const existing = checksByNormalizedName.get(normalizedName) || [];
                existing.push(run);
                checksByNormalizedName.set(normalizedName, existing);
              }

              for (const name of required) {
                const normalizedRequiredName = normalizeCheckName(name);
                const matching = checksByNormalizedName.get(normalizedRequiredName) || [];

                if (matching.length === 0) {
                  core.info(`PR #${pr.number}: waiting for check '${name}' to appear.`);
                  return false;
                }

                // Use the most recently completed run for this check name
                const latest = matching
                  .filter((r) => r.status === 'completed')
                  .sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0))[0];

                if (!latest) {
                  core.info(`PR #${pr.number}: check '${name}' is still in progress.`);
                  return false;
                }

                if (!isAcceptedCheckConclusion(latest.conclusion)) {
                  core.info(`PR #${pr.number}: check '${name}' concluded with '${latest.conclusion}'.`);
                  return false;
                }
              }

              return true;
            }

            async function rerunActionRequiredChecks(pr) {
              const rerunRunIds = new Set();
              const checks = await listAllCheckRunsForRef(pr.head.sha);
              for (const checkRun of checks) {
                if (checkRun?.conclusion !== 'action_required') {
                  continue;
                }

                const detailsUrl = checkRun.details_url || '';
                const runIdMatch = detailsUrl.match(/\/actions\/runs\/(\d+)/);
                if (runIdMatch) {
                  rerunRunIds.add(runIdMatch[1]);
                }
              }

              for (const runId of rerunRunIds) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                    owner,
                    repo,
                    run_id: Number(runId),
                  });
                  core.info(`Requested rerun for action_required run ${runId} on PR #${pr.number}.`);
                } catch (error) {
                  core.info(`Unable to rerun run ${runId} on PR #${pr.number}: ${error.message}`);
                }
              }
            }

            const candidatePullNumbers = await resolveCandidatePullNumbers();
            if (candidatePullNumbers.length === 0) {
              core.info('No candidate pull requests found for this event.');
              return;
            }

            for (const pullNumber of candidatePullNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              const trustedGeneratedPr = isTrustedGeneratedPr(pr);
              const labelEligiblePr = isLabelEligiblePr(pr);
              const allowlistedAutoApprove =
                labelEligiblePr && allowlistedAutoApproveAuthors.has(pr.user?.login || '');

              if (!trustedGeneratedPr && !labelEligiblePr) {
                core.info(
                  `Skipping PR #${pullNumber}: does not match trusted generated PR guardrails or '${autoMergeLabel}' label policy.`
                );
                continue;
              }

              await rerunActionRequiredChecks(pr);

              const checksGreen = await checksAreGreen(pr);
              if (!checksGreen) {
                core.info(`PR #${pullNumber}: checks not yet green — will retry on the next trigger.`);
                continue;
              }

              if (trustedGeneratedPr || allowlistedAutoApprove) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });

                const alreadyApproved = reviews.some(
                  (review) =>
                    review.state === 'APPROVED' &&
                    trustedAuthors.has(review.user?.login || '')
                );

                if (!alreadyApproved) {
                  try {
                    await github.rest.pulls.createReview({
                      owner,
                      repo,
                      pull_number: pullNumber,
                      event: 'APPROVE',
                      body: 'Automated approval for auto-merge-eligible PR after successful checks.',
                    });

                    core.info(`Approved PR #${pullNumber}.`);
                  } catch (error) {
                    const message = String(error.message || error);
                    if (error.status === 422 && message.includes('approve your own pull request')) {
                      core.info(`Approval skipped for PR #${pullNumber}: token identity matches PR author.`);
                    } else {
                      throw error;
                    }
                  }
                }
              }

              try {
                const mergeResponse = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: 'squash',
                });

                core.info(`Merged PR #${pullNumber}: ${mergeResponse.data.sha}`);
              } catch (error) {
                if ([405, 409, 422].includes(error.status)) {
                  core.info(`Merge deferred for PR #${pullNumber}: ${error.message}`);
                  continue;
                }

                throw error;
              }
            }
