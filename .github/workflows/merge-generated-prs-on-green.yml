name: Merge Generated PRs On Green

on:
  check_suite:
    types:
      - completed
  pull_request:
    types:
      - labeled
      - synchronize
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:

permissions:
  checks: read
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.check_suite.head_sha || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  merge-generated-pr:
    runs-on: ubuntu-latest
    # Skip check_suite events that didn't pass; skip pull_request_review unless it's an approval
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'check_suite' && contains(fromJSON('["success","neutral","skipped"]'), github.event.check_suite.conclusion))

    steps:
      - name: Approve and merge trusted generated PR when ready
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const trustedAuthors = new Set(['github-actions[bot]', 'app/github-actions']);
            const defaultBranch = context.payload.repository.default_branch;
            const baseRequiredCheckNames = ['quality-and-test', 'analyze', 'dependency-review', 'gitleaks'];
            const acceptedCheckConclusions = new Set(['success', 'neutral', 'skipped']);
            const autoMergeLabel = 'auto-merge';

            function isAcceptedCheckConclusion(conclusion) {
              return acceptedCheckConclusions.has(conclusion || '');
            }

            function isSameRepoEligiblePr(pr) {
              return (
                pr.state === 'open' &&
                !pr.draft &&
                pr.base.ref === defaultBranch &&
                pr.head.repo?.full_name === `${owner}/${repo}`
              );
            }

            async function resolveCandidatePullNumbers() {
              if (context.eventName === 'check_suite') {
                const cs = context.payload.check_suite;

                // Only process check suites from GitHub Actions
                if (cs.app?.slug !== 'github-actions') {
                  core.info(`Skipping check_suite from app '${cs.app?.slug}'.`);
                  return [];
                }

                // Prefer the PR list embedded in the check suite payload
                const fromPayload = (cs.pull_requests || []).map((pr) => pr.number).filter(Boolean);
                if (fromPayload.length > 0) return fromPayload;

                // Fall back: search open PRs for the head branch
                if (cs.head_branch) {
                  const { data: branchPullRequests } = await github.rest.pulls.list({
                    owner,
                    repo,
                    state: 'open',
                    head: `${owner}:${cs.head_branch}`,
                    base: defaultBranch,
                  });
                  return branchPullRequests.map((pr) => pr.number);
                }

                return [];
              }

              if (context.eventName === 'pull_request_review') {
                return [context.payload.pull_request.number];
              }

              if (context.eventName === 'pull_request') {
                return [context.payload.pull_request.number];
              }

              // workflow_dispatch: scan all open PRs targeting the default branch
              const { data: openPullRequests } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: defaultBranch,
                per_page: 100,
              });

              return openPullRequests.map((pr) => pr.number);
            }

            function isTrustedGeneratedPr(pr) {
              return (
                isSameRepoEligiblePr(pr) &&
                trustedAuthors.has(pr.user?.login || '') &&
                pr.title.startsWith('chore: merge ') &&
                (pr.body || '').includes('Automated pull request created after a branch push.')
              );
            }

            function hasAutoMergeLabel(pr) {
              return (pr.labels || []).some((label) => (label.name || '').toLowerCase() === autoMergeLabel);
            }

            function isLabelEligiblePr(pr) {
              return isSameRepoEligiblePr(pr) && hasAutoMergeLabel(pr);
            }

            async function listChangedFiles(pr) {
              return github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
            }

            async function requiredCheckNamesForPr(pr) {
              const required = new Set(baseRequiredCheckNames);

              const changedFiles = await listChangedFiles(pr);
              if (changedFiles.some((file) => (file.filename || '').startsWith('.github/workflows/'))) {
                required.add('lint-workflows');
              }

              return [...required];
            }

            async function listAllCheckRunsForRef(ref) {
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                },
                (response) => response.data.check_runs || []
              );

              return checkRuns.filter(Boolean);
            }

            async function checksAreGreen(pr) {
              const required = await requiredCheckNamesForPr(pr);
              const allRuns = await listAllCheckRunsForRef(pr.head.sha);

              for (const name of required) {
                const matching = allRuns.filter((r) => r?.name === name);

                if (matching.length === 0) {
                  core.info(`PR #${pr.number}: waiting for check '${name}' to appear.`);
                  return false;
                }

                // Use the most recently completed run for this check name
                const latest = matching
                  .filter((r) => r.status === 'completed')
                  .sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0))[0];

                if (!latest) {
                  core.info(`PR #${pr.number}: check '${name}' is still in progress.`);
                  return false;
                }

                if (!isAcceptedCheckConclusion(latest.conclusion)) {
                  core.info(`PR #${pr.number}: check '${name}' concluded with '${latest.conclusion}'.`);
                  return false;
                }
              }

              return true;
            }

            async function rerunActionRequiredChecks(pr) {
              const rerunRunIds = new Set();
              const checks = await listAllCheckRunsForRef(pr.head.sha);
              for (const checkRun of checks) {
                if (checkRun?.conclusion !== 'action_required') {
                  continue;
                }

                const detailsUrl = checkRun.details_url || '';
                const runIdMatch = detailsUrl.match(/\/actions\/runs\/(\d+)/);
                if (runIdMatch) {
                  rerunRunIds.add(runIdMatch[1]);
                }
              }

              for (const runId of rerunRunIds) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                    owner,
                    repo,
                    run_id: Number(runId),
                  });
                  core.info(`Requested rerun for action_required run ${runId} on PR #${pr.number}.`);
                } catch (error) {
                  core.info(`Unable to rerun run ${runId} on PR #${pr.number}: ${error.message}`);
                }
              }
            }

            const candidatePullNumbers = await resolveCandidatePullNumbers();
            if (candidatePullNumbers.length === 0) {
              core.info('No candidate pull requests found for this event.');
              return;
            }

            for (const pullNumber of candidatePullNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              const trustedGeneratedPr = isTrustedGeneratedPr(pr);
              const labelEligiblePr = isLabelEligiblePr(pr);

              if (!trustedGeneratedPr && !labelEligiblePr) {
                core.info(
                  `Skipping PR #${pullNumber}: does not match trusted generated PR guardrails or '${autoMergeLabel}' label policy.`
                );
                continue;
              }

              await rerunActionRequiredChecks(pr);

              const checksGreen = await checksAreGreen(pr);
              if (!checksGreen) {
                core.info(`PR #${pullNumber}: checks not yet green — will retry on the next trigger.`);
                continue;
              }

              if (trustedGeneratedPr) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });

                const alreadyApproved = reviews.some(
                  (review) => review.state === 'APPROVED' && trustedAuthors.has(review.user?.login || '')
                );

                if (!alreadyApproved) {
                  try {
                    await github.rest.pulls.createReview({
                      owner,
                      repo,
                      pull_number: pullNumber,
                      event: 'APPROVE',
                      body: 'Automated approval for trusted generated PR after successful checks.',
                    });

                    core.info(`Approved PR #${pullNumber}.`);
                  } catch (error) {
                    const message = String(error.message || error);
                    if (error.status === 422 && message.includes('approve your own pull request')) {
                      core.info(`Approval skipped for PR #${pullNumber}: token identity matches PR author.`);
                    } else {
                      throw error;
                    }
                  }
                }
              }

              try {
                const mergeResponse = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: 'squash',
                });

                core.info(`Merged PR #${pullNumber}: ${mergeResponse.data.sha}`);
              } catch (error) {
                if ([405, 409, 422].includes(error.status)) {
                  core.info(`Merge deferred for PR #${pullNumber}: ${error.message}`);
                  continue;
                }

                throw error;
              }
            }
