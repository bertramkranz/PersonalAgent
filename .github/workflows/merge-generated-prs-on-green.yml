name: Merge Generated PRs On Green

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  merge-when-green:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate personal-merge-bot token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 4277645
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Evaluate auto-merge conditions
        id: evaluate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            const autoMergeLabel = 'auto-merge';

            function normalize(name) {
              return String(name || '').trim().toLowerCase();
            }

            const hasAutoMergeLabel = (pr.labels || []).some(
              (label) => normalize(label.name) === autoMergeLabel
            );

            if (pr.state !== 'open') {
              core.info(`PR #${pr.number}: skipping because it is '${pr.state}'.`);
              core.setOutput('should_merge', 'false');
              return;
            }

            if (pr.draft) {
              core.info(`PR #${pr.number}: skipping because it is still a draft.`);
              core.setOutput('should_merge', 'false');
              return;
            }

            if (!hasAutoMergeLabel) {
              core.info(`PR #${pr.number}: skipping because '${autoMergeLabel}' label is not present.`);
              core.setOutput('should_merge', 'false');
              return;
            }

            core.info(`PR #${pr.number}: enabling approval and GitHub native auto-merge.`);
            core.setOutput('should_merge', 'true');

      - name: Approve and merge PR
        if: ${{ steps.evaluate.outputs.should_merge == 'true' }}
        run: |
          gh pr review ${{ github.event.number }} --approve
          gh pr merge ${{ github.event.number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
