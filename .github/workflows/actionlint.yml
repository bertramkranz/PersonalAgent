name: Actionlint

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download actionlint
        id: get_actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_ARCHIVE: actionlint_1.7.12_linux_amd64.tar.gz
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          target_dir="$RUNNER_TEMP/actionlint-${ACTIONLINT_VERSION}"
          archive_path="$target_dir/$ACTIONLINT_ARCHIVE"

          rm -rf "$target_dir"
          mkdir -p "$target_dir"

          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ACTIONLINT_ARCHIVE}" \
            -o "$archive_path"
          echo "${ACTIONLINT_SHA256}  $archive_path" | sha256sum --check
          tar -xzf "$archive_path" -C "$target_dir" actionlint

          echo "executable=$target_dir/actionlint" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Lint GitHub Actions workflows
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash
