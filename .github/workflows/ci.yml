name: CI

on:
  push:
    branches: ["main"]
    tags-ignore:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up repository and Java toolchain
        uses: ./.github/actions/setup-java-gradle
        with:
          fetch-depth: "0"
          validate-wrapper: "true"

      - name: Quality gate and tests
        run: ./gradlew --no-daemon clean check

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-reports
          path: |
            build/reports/**
            build/test-results/**
          if-no-files-found: ignore
