name: Request Copilot Review

on:
  pull_request:
    branches: ["main", "master"]
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  pull-requests: write

concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-copilot-review:
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Request Copilot review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const copilotReviewer = 'copilot-pull-request-reviewer[bot]';
            const pullNumber = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });

            const alreadyRequested = (pr.requested_reviewers || []).some((reviewer) => reviewer.login === copilotReviewer);
            if (alreadyRequested) {
              core.info('Copilot review already requested.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
                reviewers: [copilotReviewer],
              });

              core.info('Requested Copilot review.');
            } catch (error) {
              if (error.status === 422) {
                core.info(`Copilot reviewer request skipped: ${error.message}`);
                return;
              }

              throw error;
            }