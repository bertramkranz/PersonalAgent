name: Auto Manage Generated PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-manage-generated-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  manage-generated-pr:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.user.login == 'github-actions[bot]' || github.event.pull_request.user.login == 'app/github-actions') &&
      startsWith(github.event.pull_request.title, 'chore: merge ') &&
      contains(github.event.pull_request.body || '', 'Automated pull request created after a branch push.')
    runs-on: ubuntu-latest

    steps:
      - name: Auto approve trusted generated PR
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          review-message: "Automated approval for trusted generated PR."

      - name: Enable auto-merge when allowed
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const pullRequestId = context.payload.pull_request.node_id;

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId }
              );

              core.info('Enabled auto-merge.');
            } catch (error) {
              const message = String(error.message || error);

              if (message.includes('already enabled')) {
                core.info('Auto-merge is already enabled.');
                return;
              }

              if (message.includes('Auto-merge is disabled') || message.includes('Auto-merge is not enabled')) {
                core.info('Repository auto-merge is disabled. Merge fallback workflow will handle final merge.');
                return;
              }

              throw error;
            }