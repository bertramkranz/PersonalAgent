name: Autofix On Push

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "**"

permissions:
  contents: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint-autofix:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip autofix]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up repository and Java toolchain
        uses: ./.github/actions/setup-java-gradle

      - name: Apply ktlint formatting fixes
        run: ./gradlew --no-daemon ktlintFormat

      - name: Commit autofix changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): apply ktlint autofix [skip autofix]"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
