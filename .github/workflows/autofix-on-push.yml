name: Autofix On Push

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "**"

permissions:
  contents: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint-autofix:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip autofix]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Apply ktlint formatting fixes
        run: ./gradlew --no-daemon ktlintFormat

      - name: Commit autofix changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): apply ktlint autofix [skip autofix]"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
