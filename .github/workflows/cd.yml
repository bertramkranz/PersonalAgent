name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_ref:
        description: "Tag ref to release (for example v1.0.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Set up repository and Java toolchain
        uses: ./.github/actions/setup-java-gradle
        with:
          ref: ${{ github.event.inputs.tag_ref || github.ref }}
          validate-wrapper: "true"

      - name: Build distributions
        run: ./gradlew --no-daemon clean check distZip distTar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.inputs.tag_ref || github.ref_name }}
          name: ${{ github.event.inputs.tag_ref || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            build/distributions/*.zip
            build/distributions/*.tar
          generate_release_notes: true
