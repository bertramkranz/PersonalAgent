name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_ref:
        description: "Tag ref to release (for example v1.0.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_ref || github.ref }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build distributions
        run: ./gradlew --no-daemon clean check distZip distTar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_ref || github.ref_name }}
          files: |
            build/distributions/*.zip
            build/distributions/*.tar
          generate_release_notes: true
