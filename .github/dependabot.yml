version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "UTC"
    allow:
      - dependency-type: "production"
    groups:
      gradle-production:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    assignees:
      - "bertramkranz"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "gradle"
      - "production"

  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "13:00"
      timezone: "UTC"
    allow:
      - dependency-type: "development"
    groups:
      gradle-development:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    assignees:
      - "bertramkranz"
    commit-message:
      prefix: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "gradle"
      - "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      time: "09:00"
      timezone: "UTC"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    assignees:
      - "bertramkranz"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
